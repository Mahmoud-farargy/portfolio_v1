<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-dark">
        <div class="container bg-dark">
            <button class="navbar-toggler border border-white" data-toggle="collapse" data-target="#myNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="myNav">
                <ul class="navbar-nav ml-auto" >
                    <li class="nav-item"><a class='nav-link text-white' target="_blank" href="https://www.who.int/emergencies/diseases/novel-coronavirus-2019">Latest information from the WHO about COVID-19</a></li>
                </ul>
            </div>
        </div>

    <section class="container pt-5" id="app">
        <!-- <ul class="list-group list-group-striped totalSummary"> -->

        <!-- </ul> -->
        <h2 class="text-uppercase">Coronavirus pandemic count</h2>
        

        <h5>These status are updating constantly.</h5>
    <!-- WORLD -->
                    <!-- mobile -->
        <h6 class="text-secondary area mt-3">Global</h6>

        
        
                    <!-- desktop -->
        
        <div style="overflow-x:auto" id="desktopGlobal">
            
        </div>
        <h6 class="text-secondary my-3 area">Countries</h6>
        <!-- SEARCH -->
        <form @submit="searchSubmit">
            <input class="searchInputStyle m-1" type="text" v-model="insertedCountry" value="insertedCountry" placeholder="Search country...">
            <button class="searchBtn" @click="beginSearching" @keyup.enter="beginSearching"><i class="fas fa-search text-dark"></i> Search</button>
        </form>
        <div style="overflow-x:auto" v-if="searching">
                <table class="table table-striped table-bordered my-5" >
                <thead class="thead-light">
                    <tr>
                        <th>Country</th>
                        <th>Cases</th>
                        <th>Deaths</th>
                        <th>Recovered</th>
                        <th>New Cases</th>
                        <th>Today's Deaths</th>
                    </tr>
                </thead>
                <tbody class="totalSummary2 bg-white tbody2" style="font-size:19px;">

                </tbody>
                
                
                

            </table>
        </div>

        <!-- COUNTRIES -->
        <div style="overflow-x:auto" id="desktopCountries">
                
        </div>

    </section>
